<main id="body">

  @for (producto of productos; track producto.id) {

    <div class="tarjeta">

      <div class="contenido">

        <img
          [src]="producto.imagen"
          [alt]="producto.nombre"
        >

        <h5>{{ producto.nombre }}</h5>

        <p>
          {{ producto.descripcion }}
        </p>

        <p>
          <strong>${{ producto.precio }}</strong>
        </p>

        <button
          type="button"
          class="btn"
          (click)="agregarCarrito(producto)"
        >
          Comprar
        </button>

        <button
          type="button"
          class="btn"
          (click)="agregarFavorito(producto)"
        >
          ❤️
        </button>

      </div>

    </div>

  }

</main>
