<div class="carrito">

  <h1>🩷 Mis Servicios</h1>

  @if (productosCarrito.length === 0) {

    <div class="vacio">
      <p>✨ Aún no agregaste ningún servicio.</p>
    </div>

  }

  @for (producto of productosCarrito; track producto.id) {

    <div class="producto">

      <div class="info">

        <h2>{{ producto.nombre }}</h2>

        <p class="precio">
          ${{ producto.precio }}
        </p>

      </div>

      <div class="cantidad">

        <button
          type="button"
          (click)="disminuir(producto.id)">
          −
        </button>

        <span>{{ producto.cantidad }}</span>

        <button
          type="button"
          (click)="aumentar(producto.id)">
          +
        </button>

      </div>

      <button
        class="eliminar"
        type="button"
        (click)="eliminar(producto.id)">
        Eliminar
      </button>

    </div>

  }

  @if (productosCarrito.length > 0) {

    <div class="total">

      <h2>Total</h2>

      <p>${{ total() }}</p>

    </div>

  }

</div>
